name: CI and Docker Publish

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # golangci-lint runs `go build` under the hood. The embed directive in
      # internal/api needs *some* dist folder to exist; rather than wire up
      # the npm pipeline here, stub the directory so static analysis can
      # type-check the code without producing the real frontend bundle.
      - name: Stub embed assets so lint can compile
        run: |
          mkdir -p backend/internal/api/dist/assets
          touch backend/internal/api/dist/index.html
          touch backend/internal/api/dist/assets/.gitkeep

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.0.0
        with:
          version: v2.6.2
          working-directory: backend

  backend-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies for go:embed
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets for backend tests
        working-directory: frontend
        run: npm run build

      - name: Sync frontend dist into backend embed directory
        run: |
          rm -rf backend/internal/api/dist
          mkdir -p backend/internal/api/dist
          cp -R frontend/dist/. backend/internal/api/dist/

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

  frontend-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend production build
        run: npm run build

  docker-smoke:
    # End-to-end smoke of the published Docker image: build locally with the
    # same Dockerfile as the publish job, start the container, wait for the
    # health endpoint to flip to 200, then exercise zenithctl via docker
    # exec. Catches regressions where the image builds but the panel can't
    # actually boot inside Alpine (missing libc, broken paths, etc.) before
    # we ship it to ghcr.io.
    runs-on: ubuntu-latest
    needs:
      - backend-verify
      - frontend-verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build image locally (no push)
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          load: true
          tags: zenithpanel:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d \
            --name zsmoke \
            -p 18080:8080 \
            -e ZENITH_PORT=8080 \
            zenithpanel:smoke
          # Tiny startup grace; the polling loop covers slow boots.
          sleep 2

      - name: Wait for /api/v1/health → 200
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18080/api/v1/health > /tmp/health.json; then
              echo "Panel responded after ${i}s:"
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          echo "::error::Panel never returned 200 on /health"
          docker logs zsmoke | tail -50
          exit 1

      - name: Exercise zenithctl inside the container
        run: |
          docker exec zsmoke /opt/zenithpanel/zenithpanel ctl version
          docker exec zsmoke /opt/zenithpanel/zenithpanel ctl status

      - name: Dump tail of panel logs (for the record)
        if: always()
        run: docker logs zsmoke 2>&1 | tail -40

      - name: Tear down
        if: always()
        run: docker rm -f zsmoke || true

  build-and-push-image:
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-verify
      - frontend-verify
      - docker-smoke
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Install the cosign tool except on PR
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.5'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Override default tag list so :latest tracks the default branch.
          # Without this, latest only updates on git tag pushes (v*.*.*), which
          # left users on :latest pulling stale images between releases.
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr,prefix=pr-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sign the published Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
